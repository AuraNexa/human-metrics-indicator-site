<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#fbfaf6" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="canonical" href="https://human-metrics-indicator-site.pages.dev/catalog.html" />
    <title>全部指标目录 · 人类指标资料库</title>
    <meta name="description" content="查看全部指标目录，按方向筛选并进入单套指标资料页。" />
    <meta property="og:title" content="全部指标目录 · 人类指标资料库" />
    <meta property="og:description" content="查看全部指标目录，按方向筛选并进入单套指标资料页。" />
    <meta property="og:image" content="https://human-metrics-indicator-site.pages.dev/assets/share-cover.webp" />
    <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
    <script src="./indicator-data.js" defer></script>
    <script src="./app.js" defer></script>
  </head>
  <body>
    <a class="skip-link" href="#library">跳到全部目录</a>
    <header class="site-header">
      <a class="brand" href="./index.html" aria-label="人类指标资料库首页">
        <span>
          <strong>人类指标资料库</strong>
        </span>
      </a>
      <nav class="top-nav" aria-label="主导航">
        <a href="./index.html">首页</a>
        <a href="./library.html">指标库</a>
        <a href="./catalog.html" aria-current="page">全部目录</a>
      </nav>
      <button class="nav-cta selection-trigger" type="button" data-selection-trigger>
        我的组合 <span data-selection-count>0</span>
      </button>
    </header>

    <main id="top" class="library-type-page catalog-page">
      <section class="catalog-choice-hero" aria-labelledby="catalog-title">
        <article class="library-choice choice-c" aria-labelledby="catalog-title">
          <div class="choice-window" aria-hidden="true">
            <img src="./assets/library-archive-v2.webp" alt="" />
          </div>
          <div class="library-choice-copy">
            <p class="choice-kicker">资料柜入口</p>
            <h1 id="catalog-title">全部目录</h1>
            <p>像翻资料卡一样，先选方向，再进入单套资料；也可以直接搜索具体词。</p>
            <a class="text-action primary-link" href="./library.html">返回指标库</a>
          </div>
        </article>
      </section>

      <section id="library" class="catalog-archive-section is-revealed" aria-label="全部指标目录">
        <aside class="catalog-archive-side">
          <div class="search-box catalog-search-box">
            <label for="searchInput">查找指标</label>
            <input id="searchInput" type="search" placeholder="正行、记忆力、婚恋、管理" autocomplete="off" />
          </div>
          <div class="catalog-direction-index">
            <h2>方向索引</h2>
            <div class="category-list catalog-direction-list" id="categoryList"></div>
          </div>
        </aside>

        <div class="catalog-archive-main">
          <div class="catalog-index-head">
            <span><strong id="resultCount">0</strong> 套目录</span>
            <p>
              <span>选择一套资料进入独立阅读页，继续查看细项。</span>
              <span>也可以把以后想搭配查询的指标加入组合。</span>
            </p>
          </div>

          <div id="packGrid" class="pack-grid catalog-row-list"></div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p>内容仅供娱乐、自我观察与日常交流参考，不构成医学、心理、法律、财务、教育或招聘专业建议。<a href="./notice.html">阅读须知</a></p>
    </footer>
  </body>
</html>
