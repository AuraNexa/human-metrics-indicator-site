<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#fbfaf6" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="canonical" href="https://human-metrics-indicator-site.pages.dev/library.html" />
    <title>指标库 · Human Metrics</title>
    <meta name="description" content="按场景浏览人类指标资料，查看目录、代表指标和解释边界。" />
    <meta property="og:title" content="指标库 · Human Metrics" />
    <meta property="og:description" content="按场景浏览指标资料，查看目录、代表指标和阅读边界。" />
    <meta property="og:image" content="https://human-metrics-indicator-site.pages.dev/assets/share-cover.webp" />
    <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
    <script src="./app.js" defer></script>
  </head>
  <body>
    <a class="skip-link" href="#library">跳到指标库</a>
    <header class="site-header">
      <a class="brand" href="./index.html" aria-label="Human Metrics 首页">
        <span>
          <strong>人类指标资料库</strong>
          <small>Human Metrics</small>
        </span>
      </a>
      <nav class="top-nav" aria-label="主导航">
        <a href="./index.html">首页</a>
        <a href="./library.html" aria-current="page">指标库</a>
        <a href="./custom.html">专题查询</a>
        <a href="./sample.html">查阅说明</a>
      </nav>
      <a class="nav-cta" href="./custom.html">按专题查</a>
    </header>

    <main id="top" class="library-type-page">
      <section class="type-hero" aria-labelledby="library-title">
        <p class="section-kicker">指标库</p>
        <h1 id="library-title">先认识方向，再进入指标。</h1>
        <p>
          每套指标先回答一个具体问题：它观察什么、包含哪些代表项、适合在哪些场景查阅。
        </p>
        <a class="text-action primary-link" href="#library">浏览全部指标</a>
      </section>

      <section class="indicator-roles" aria-label="指标方向">
        <div id="roleGallery" class="role-gallery"></div>
      </section>

      <section id="library" class="type-profile-section" aria-label="指标详情阅读">
        <div class="type-toolbar">
          <div class="search-box">
            <label for="searchInput">查找指标</label>
            <input id="searchInput" type="search" placeholder="正行、记忆力、婚恋、管理" autocomplete="off" />
          </div>
          <div class="category-area">
            <p class="control-label">快速筛选</p>
            <div class="category-list" id="categoryList"></div>
          </div>
        </div>

        <div class="type-profile-layout">
          <aside class="type-explore" aria-label="当前目录列表">
            <div class="catalog-summary">
              <span><strong id="resultCount">0</strong> 套目录</span>
              <small>当前方向</small>
            </div>
            <div id="packGrid" class="pack-grid"></div>
          </aside>

          <article class="detail-panel" aria-label="指标详情">
            <div class="detail-card" id="detailPanel">
              <p class="empty-title">选择一个指标目录</p>
              <p class="empty-copy">点击任意目录条目，即可查看结构、代表指标和表达边界。</p>
            </div>
          </article>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div>
        <strong>Human Metrics 人类指标资料库</strong>
        <p>日常观察 · 了解当下 · 辅助修正</p>
      </div>
      <p><a href="./notice.html">阅读须知</a> · 内容仅供娱乐和日常交流参考，不构成专业建议。</p>
    </footer>
  </body>
</html>
