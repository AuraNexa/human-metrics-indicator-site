    <link rel="stylesheet" href="./styles.css" />
    <script src="./app.js" defer></script>
  </head>
  <body>
    <a class="skip-link" href="#library-directions">跳到指标方向</a>
    <header class="site-header">
      <a class="brand" href="./index.html" aria-label="人类指标资料库首页">
        <span>
          <strong>人类指标资料库</strong>
        </span>
      </a>
      <nav class="top-nav" aria-label="主导航">
        <a href="./index.html">首页</a>
        <a href="./library.html" aria-current="page">指标库</a>
        <a href="./catalog.html">全部目录</a>
      </nav>
      <button class="nav-cta selection-trigger" type="button" data-selection-trigger>
        我的组合 <span data-selection-count>0</span>
      </button>
    </header>

    <main id="top" class="library-type-page library-visual-page">
      <section class="library-visual-hero library-hero-options" aria-labelledby="library-title">
        <article class="library-choice choice-b" aria-labelledby="library-title">
          <div class="library-choice-copy">
            <p class="choice-kicker">问题入口</p>
            <h1 id="library-title">从当下关心的事开始查</h1>
            <p>先判断问题属于哪一类，再进入对应资料；后面如果需要搭配查看，可以加入自己的组合。</p>
            <a class="text-action primary-link" href="./catalog.html">查看全部目录</a>
          </div>
          <div class="choice-tile-grid" aria-hidden="true">
            <span>
              <img src="./assets/indicator-art/ordinary-status.webp" alt="" />
              个人状态
            </span>
            <span>
              <img src="./assets/indicator-art/child-learning.webp" alt="" />
              孩子教育
            </span>
            <span>
              <img src="./assets/indicator-art/female-boyfriend-screen.webp" alt="" />
              关系婚恋
            </span>
            <span>
              <img src="./assets/indicator-art/management-pro.webp" alt="" />
              职场用人
            </span>
          </div>
        </article>
      </section>

      <section id="library-directions" class="indicator-roles" aria-label="指标方向">
        <div id="roleGallery" class="role-gallery"></div>
      </section>
    </main>

    <footer class="site-footer">
      <p>内容仅供娱乐、自我观察与日常交流参考，不构成医学、心理、法律、财务、教育或招聘专业建议。<a href="./notice.html">阅读须知</a></p>
    </footer>
  </body>
